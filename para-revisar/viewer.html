<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visor — Para Revisar</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0f1117; color: #e2e8f0;
    min-height: 100vh; padding: 32px 24px;
    line-height: 1.7;
  }

  header {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 32px; padding-bottom: 16px;
    border-bottom: 1px solid #1e2535;
  }
  header a { color: #60a5fa; text-decoration: none; font-size: 13px; }
  header a:hover { text-decoration: underline; }
  #filename { font-size: 13px; color: #475569; font-family: monospace; }

  #content {
    max-width: 820px;
    margin: 0 auto;
  }

  /* Markdown styles */
  #content h1 { font-size: 26px; font-weight: 700; color: #f1f5f9; margin: 32px 0 14px; border-bottom: 1px solid #1e2535; padding-bottom: 8px; }
  #content h2 { font-size: 20px; font-weight: 700; color: #f1f5f9; margin: 28px 0 12px; }
  #content h3 { font-size: 16px; font-weight: 700; color: #cbd5e1; margin: 22px 0 10px; }
  #content h4, #content h5, #content h6 { font-size: 14px; font-weight: 700; color: #94a3b8; margin: 18px 0 8px; }

  #content p { margin: 0 0 14px; color: #cbd5e1; }

  #content strong { color: #f1f5f9; font-weight: 700; }
  #content em { color: #a5b4fc; font-style: italic; }

  #content a { color: #60a5fa; text-decoration: none; }
  #content a:hover { text-decoration: underline; }

  #content code {
    background: #1a2033; border: 1px solid #2d3748;
    border-radius: 4px; padding: 2px 6px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 12px; color: #7dd3fc;
  }

  #content pre {
    background: #0a0d14; border: 1px solid #1e2535;
    border-radius: 8px; padding: 16px 18px;
    overflow-x: auto; margin: 0 0 16px;
  }
  #content pre code {
    background: none; border: none; padding: 0;
    font-size: 13px; color: #94a3b8; line-height: 1.6;
  }

  #content blockquote {
    border-left: 3px solid #3b82f6;
    background: #141824; border-radius: 0 6px 6px 0;
    padding: 10px 16px; margin: 0 0 14px;
    color: #94a3b8;
  }

  #content ul, #content ol { padding-left: 24px; margin: 0 0 14px; }
  #content li { margin-bottom: 5px; color: #cbd5e1; }
  #content li > ul, #content li > ol { margin: 5px 0 0; }

  #content hr {
    border: none; border-top: 1px solid #1e2535;
    margin: 28px 0;
  }

  #content table {
    width: 100%; border-collapse: collapse;
    margin: 0 0 16px; font-size: 13px;
  }
  #content th {
    text-align: left; padding: 8px 12px;
    background: #141824; color: #64748b;
    font-size: 11px; text-transform: uppercase; letter-spacing: .6px;
    border-bottom: 2px solid #1e2535;
  }
  #content td {
    padding: 9px 12px; border-bottom: 1px solid #141824;
    color: #cbd5e1;
  }
  #content tr:last-child td { border-bottom: none; }

  .loading { text-align: center; color: #475569; padding: 60px 0; }
  .error { color: #f87171; padding: 20px; background: #3b1212; border-radius: 8px; }
</style>
</head>
<body>
<header>
  <a href="/para-revisar/">&larr; Para Revisar</a>
  <span id="filename"></span>
</header>
<div id="content"><div class="loading">Cargando…</div></div>

<script>
// ── Markdown parser mínimo pero completo ──────────────────────────────────────
function renderMd(md) {
  let html = md;

  // Escapar HTML
  const esc = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Bloques de código (```...```)
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    codeBlocks.push(`<pre><code class="lang-${lang}">${esc(code.trimEnd())}</code></pre>`);
    return `\x00CODE${idx}\x00`;
  });

  // Código inline (`...`)
  html = html.replace(/`([^`\n]+)`/g, (_, c) => `<code>${esc(c)}</code>`);

  // Horizontal rules
  html = html.replace(/^(?:---|\*\*\*|___)\s*$/gm, '<hr>');

  // Headers
  html = html.replace(/^######\s+(.+)$/gm, '<h6>$1</h6>');
  html = html.replace(/^#####\s+(.+)$/gm, '<h5>$1</h5>');
  html = html.replace(/^####\s+(.+)$/gm, '<h4>$1</h4>');
  html = html.replace(/^###\s+(.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^##\s+(.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^#\s+(.+)$/gm, '<h1>$1</h1>');

  // Blockquotes
  html = html.replace(/((?:^>.*\n?)+)/gm, block => {
    const inner = block.replace(/^>\s?/gm, '').trim();
    return `<blockquote>${inner}</blockquote>\n`;
  });

  // Bold / italic
  html = html.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  html = html.replace(/__(.+?)__/g, '<strong>$1</strong>');
  html = html.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  html = html.replace(/_([^_\n]+)_/g, '<em>$1</em>');

  // Links e imágenes
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" style="max-width:100%">');
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // Listas: agrupar líneas consecutivas
  html = html.replace(/((?:^[ \t]*[-*+]\s.+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*[-*+]\s/, '').trim()}</li>`);
    return `<ul>${items.join('')}</ul>\n`;
  });
  html = html.replace(/((?:^[ \t]*\d+\.\s.+\n?)+)/gm, block => {
    const items = block.trim().split('\n').map(l => `<li>${l.replace(/^[ \t]*\d+\.\s/, '').trim()}</li>`);
    return `<ol>${items.join('')}</ol>\n`;
  });

  // Tablas GFM
  html = html.replace(/((?:^\|.+\|\n)+)/gm, block => {
    const rows = block.trim().split('\n');
    if (rows.length < 2) return block;
    const isSep = r => /^\|[-:| ]+\|$/.test(r.trim());
    const cells = r => r.split('|').slice(1,-1).map(c => c.trim());
    let out = '<table>';
    let inBody = false;
    for (const row of rows) {
      if (isSep(row)) { inBody = true; continue; }
      const tag = inBody ? 'td' : 'th';
      out += `<tr>${cells(row).map(c => `<${tag}>${c}</${tag}>`).join('')}</tr>`;
    }
    return out + '</table>\n';
  });

  // Párrafos: bloques de texto separados por líneas en blanco
  html = html.replace(/\n{2,}/g, '\n\n');
  const blocks = html.split('\n\n');
  html = blocks.map(b => {
    b = b.trim();
    if (!b) return '';
    if (/^<(h[1-6]|ul|ol|li|blockquote|pre|hr|table|tr|th|td|\x00CODE)/.test(b)) return b;
    return `<p>${b.replace(/\n/g, '<br>')}</p>`;
  }).join('\n');

  // Restaurar bloques de código
  codeBlocks.forEach((code, i) => {
    html = html.replace(`\x00CODE${i}\x00`, code);
  });

  return html;
}

// ── Cargar y renderizar ───────────────────────────────────────────────────────
const params = new URLSearchParams(location.search);
const file   = params.get('file');

if (!file) {
  document.getElementById('content').innerHTML = '<div class="error">Falta parámetro ?file=</div>';
} else {
  document.getElementById('filename').textContent = file;
  document.title = file + ' — Para Revisar';

  fetch(file + '?t=' + Date.now())
    .then(r => {
      if (!r.ok) throw new Error(`${r.status} ${r.statusText}`);
      return r.text();
    })
    .then(md => {
      document.getElementById('content').innerHTML = renderMd(md);
    })
    .catch(e => {
      document.getElementById('content').innerHTML = `<div class="error">Error al cargar ${file}: ${e.message}</div>`;
    });
}
</script>
</body>
</html>
